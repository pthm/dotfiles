# Global mise config — symlinked to ~/.config/mise/config.toml
# System-wide dev toolchains. Projects override with their own mise.toml.

[tools]
# languages / runtimes
go = "latest"
node = "lts"
bun = "latest"
zig = "latest"
uv = "latest"

# dev CLIs
buf = "latest"
pnpm = "latest"
flyctl = "latest"
watchexec = "latest"
"cargo:ck-search" = "latest"
"npm:@openai/codex" = "latest"

# go tooling
"go:golang.org/x/tools/gopls" = "latest"
"go:mvdan.cc/gofumpt" = "latest"
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "latest"
"go:honnef.co/go/tools/cmd/staticcheck" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
"go:golang.org/x/tools/cmd/deadcode" = "latest"
"go:gotest.tools/gotestsum" = "latest"
"go:github.com/gotesttools/gotestfmt/v2/cmd/gotestfmt" = "latest"
"go:github.com/air-verse/air" = "latest"
"go:github.com/pressly/goose/v3/cmd/goose" = "latest"
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = "latest"
"go:github.com/a-h/templ/cmd/templ" = "latest"
"go:github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen" = "latest"
"go:github.com/ogen-go/ogen/cmd/ogen" = "latest"
"go:google.golang.org/protobuf/cmd/protoc-gen-go" = "latest"
"go:connectrpc.com/connect/cmd/protoc-gen-connect-go" = "latest"
"go:github.com/sudorandom/protoc-gen-connect-openapi" = "latest"
"go:github.com/pseudomuto/protoc-gen-doc/cmd/protoc-gen-doc" = "latest"
"go:github.com/lasorda/protobuf-language-server" = "latest"

# personal tools
"go:github.com/pthm/cclint/cmd/cclint" = "latest"
"go:github.com/pthm/orchard" = "latest"
