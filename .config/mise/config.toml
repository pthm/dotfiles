# Global mise config — symlinked to ~/.config/mise/config.toml
# System-wide dev toolchains. Projects override with their own mise.toml.

[tools]
# languages / runtimes
go = "latest"
node = "lts"
bun = "latest"
zig = "latest"
uv = "latest"

# dev CLIs
buf = "latest"
pnpm = "latest"
watchexec = "latest"
"npm:@openai/codex" = "latest"

# build / release (moved from Brewfile)
just = "latest"
task = "latest" # go-task
goreleaser = "latest"
pre-commit = "latest"

# kubernetes / cloud (moved from Brewfile)
helm = "latest"
kubectx = "latest"
kubens = "latest"
cloud-sql-proxy = "latest"
gcloud = "latest" # was the gcloud-cli cask; vfox plugin pulls the full Cloud SDK

# go tooling
"go:golang.org/x/tools/gopls" = "latest"
"go:mvdan.cc/gofumpt" = "latest"
"go:honnef.co/go/tools/cmd/staticcheck" = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"
"go:golang.org/x/tools/cmd/deadcode" = "latest"
